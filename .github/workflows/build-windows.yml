name: Build Windows app

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore KeyboardLayoutFixer.sln

      - name: Build
        run: dotnet build KeyboardLayoutFixer.sln --configuration Release --no-restore

      - name: Publish runtime-dependent exe
        run: >
          dotnet publish src/KeyboardLayoutFixer/KeyboardLayoutFixer.csproj
          --configuration Release
          --runtime win-x64
          --self-contained false
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true
          -o artifacts/KeyboardLayoutFixer

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KeyboardLayoutFixer-win-x64-runtime-dependent
          path: artifacts/KeyboardLayoutFixer/
